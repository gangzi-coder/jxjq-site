<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>惊喜进球 - 数据维护</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="admin-page">
    <section id="loginBox" class="panel">
      <h1>数据维护</h1>
      <label>
        维护密码
        <input id="password" type="password" placeholder="请输入密码">
      </label>
      <button id="loginBtn">进入维护</button>
      <p id="loginMsg" class="msg"></p>
      <a href="index.html">返回首页</a>
    </section>

    <section id="editBox" class="panel hidden">
      <div class="admin-head">
        <h1>惊喜进球数据</h1>
        <a href="index.html">返回首页</a>
      </div>

      <label>
        页面标题
        <input id="titleInput" type="text">
      </label>

      <div class="actions">
        <button id="addBtn" class="btn-secondary">新增一行</button>
        <button id="clearBtn" class="btn-danger">清空全部</button>
        <button id="saveBtn">保存</button>
      </div>

      <div class="table-scroll">
        <table class="edit-table">
          <thead>
            <tr>
              <th>日期</th>
              <th>投注方案</th>
              <th>自购</th>
              <th>奖金</th>
              <th>赛果</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="editRows"></tbody>
        </table>
      </div>

      <p id="saveMsg" class="help">点击保存会直接写入当前数据源。本地运行时写入 data.json，Cloudflare 部署后写入 KV。</p>
    </section>
  </main>

  <script src="admin.js"></script>
</body>
</html>
