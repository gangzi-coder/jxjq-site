<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>惊喜进球</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <section class="board">
      <header class="hero">
        <div class="mark" aria-hidden="true">
          <span>进球</span>
        </div>
        <div class="title-wrap">
          <h1 id="pageTitle">惊喜进球</h1>
          <p>精选方案 · 实时赛果</p>
        </div>
        <div class="mark right" aria-hidden="true">
          <span>小将</span>
        </div>
      </header>

      <table>
        <thead>
          <tr>
            <th>日期</th>
            <th>投注方案</th>
            <th>自购</th>
            <th>奖金</th>
            <th>赛果</th>
          </tr>
        </thead>
        <tbody id="rows">
          <tr><td colspan="5">数据加载中...</td></tr>
        </tbody>
      </table>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
